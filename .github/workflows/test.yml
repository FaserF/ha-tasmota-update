name: Test

on:
  workflow_call:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt || echo "No test requirements file found"
          pip install pytest pytest-asyncio pytest-cov homeassistant paramiko aiohttp
      - name: Test with pytest
        run: |
          pytest --cov=custom_components.tasmota_fwupdate --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
