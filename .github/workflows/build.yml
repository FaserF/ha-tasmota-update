name: Build

on:
  workflow_call:

jobs:
  build:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Validate JSON/YAML
        run: |
          python -c "import json, glob; [json.load(open(f)) for f in glob.glob('**/*.json', recursive=True)]"
          pip install pyyaml
          python -c "import yaml, glob; [yaml.safe_load(open(f)) for f in glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True)]"
      - name: Check Integration Structure
        run: |
          test -d custom_components/tasmota_fwupdate
          test -f custom_components/tasmota_fwupdate/manifest.json
          test -f hacs.json
